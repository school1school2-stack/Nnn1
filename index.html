<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج (1) - حماية فائقة - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; background: #fff; margin-bottom: 10px; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none !important; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; line-height: 1.8; color: #222; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; text-align: center; font-size: 1.2rem; background: #fff; margin-bottom: 10px; font-weight: 600; }
        .correct { background: var(--correct) !important; color: white; }
        .wrong { background: var(--wrong) !important; color: white; }
        .fb-box { margin-top: 20px; padding: 20px; background: #f0f4ff; border-right: 8px solid var(--gold); border-radius: 8px; display: none; }
        .reading-text { background-color: #fffde7; border: 1px solid #fff59d; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1.1rem; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card">
    <div class="header">
        <h3 style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي ✨</h3>
        <h2 style="margin:5px 0;">محاكي القدرات - نموذج (1)</h2>
        <p style="margin:0; color:var(--gold); font-weight:bold;">ثانوية الأمير عبدالمجيد 😊</p>
    </div>

    <!-- رسالة المنع المشددة -->
    <div id="blocked-page" class="hidden" style="text-align: center; padding: 50px;">
        <h2 style="color: var(--wrong);">نظام الحماية 🛡️</h2>
        <p style="font-size: 1.3rem;">عذراً، تم تسجيل دخول مسبق لهذا الاسم أو من هذا الجهاز.</p>
        <p>لا يُسمح بإعادة الاختبار لضمان دقة النتائج والعدالة.</p>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group"><input type="text" id="studentName" placeholder="الاسم الثلاثي الحقيقي"></div>
        <div class="input-group">
            <select id="stageSelect" onchange="updateClasses()">
                <option value="">-- اختر المرحلة الدراسية --</option>
                <option value="أول ثانوي">أول ثانوي</option>
                <option value="ثاني ثانوي">ثاني ثانوي</option>
                <option value="ثالث ثانوي">ثالث ثانوي</option>
            </select>
            <select id="studentClass" class="hidden"><option value="">-- اختر الفصل --</option></select>
        </div>
        <button id="check-btn" class="btn" onclick="validateAndStart()">التحقق والدخول 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <!-- (هنا كود صفحة الاختبار والأسئلة كما هو في الكود السابق) -->
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">النتيجة النهائية</h2>
        <div style="font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold);" id="score-text"></div>
        <p id="cloud-msg"></p>
        <button class="btn" onclick="location.reload()">إغلاق</button>
    </div>
</div>

<script>
    const MODEL_ID = "model_01"; 
    // بصمة الجهاز (Fingerprint) تعتمد على خصائص الشاشة والمتصفح لتمييز الجهاز حتى لو تغير المتصفح
    const DEVICE_ID = btoa(navigator.userAgent + screen.width + screen.height + navigator.language);

    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // وظيفة التحقق المشددة قبل البدء
    async function validateAndStart() {
        const name = document.getElementById('studentName').value.trim();
        const sClass = document.getElementById('studentClass').value;

        if (name.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي الحقيقي.");
        if (!sClass) return alert("يرجى اختيار المرحلة والفصل.");

        document.getElementById('check-btn').innerText = "جاري التحقق من أمان الجهاز...";
        document.getElementById('check-btn').disabled = true;

        try {
            // 1. التحقق من قاعدة البيانات بالاسم والفصل (لمنع دخول نفس الطالب من جهاز آخر)
            const nameCheck = await db.collection("student_results")
                .where("name", "==", name)
                .where("student_class", "==", sClass)
                .where("model_id", "==", MODEL_ID)
                .get();

            // 2. التحقق من قاعدة البيانات ببصمة الجهاز (لمنع دخول نفس الجهاز باسم مختلف)
            const deviceCheck = await db.collection("student_results")
                .where("device_id", "==", DEVICE_ID)
                .where("model_id", "==", MODEL_ID)
                .get();

            if (!nameCheck.empty || !deviceCheck.empty || localStorage.getItem("done_" + MODEL_ID)) {
                showBlocked();
                return;
            }

            // إذا كان كل شيء سليم، نبدأ الاختبار
            startQuiz();
        } catch (e) {
            console.error(e);
            alert("حدث خطأ في الاتصال بالسحابة.");
        }
    }

    function showBlocked() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('blocked-page').classList.remove('hidden');
    }

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        // (استدعاء وظيفة تحميل السؤال الأول)
    }

    // إضافة بصمة الجهاز عند حفظ النتيجة النهائية
    async function finishQuiz() {
        localStorage.setItem("done_" + MODEL_ID, "true"); 
        // (كود حفظ النتيجة في Firebase مع إضافة حقل device_id: DEVICE_ID)
    }

    // بقية كود تحديث الفصول والأسئلة يوضع هنا...
</script>
</body>
</html>
