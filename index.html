<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النموذج (21) السحابي - أ/ عبدالعزيز الفيفي</title>
    <!-- تضمين مكتبات Firebase السحابية -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; line-height: 1.8; color: #222; min-height: 80px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none !important; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }
        .fb-box { margin-top: 20px; padding: 15px; background: #f0f4ff; border-right: 5px solid var(--maroon); border-radius: 8px; line-height: 1.6; display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card">
    <div class="header">
        <h3 style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد 😊</h3>
        <h2 style="margin:10px 0;">نموذج (21) - الربط السحابي والخلط الذكي</h2>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group"><input type="text" id="studentName" placeholder="أدخل الاسم الثلاثي الحقيقي"></div>
        <div class="input-group">
            <select id="studentClass">
                <option value="">اختر الفصل</option>
                <option value="101">101</option><option value="102">102</option>
                <option value="103">103</option><option value="104">104</option>
                <option value="201">201</option><option value="202">202</option>
            </select>
        </div>
        <button class="btn" onclick="startQuiz()">بدء الاختبار 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold; font-size: 1.1rem;"></div>
            <div id="timer">45</div>
        </div>
        <div id="question-text" class="q-text"></div>
        <div id="options-box" class="options-grid"></div>
        <div id="fb-area" class="fb-box"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">انتهى الاختبار السحابي بنجاح</h2>
        <div style="font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold);" id="score-text"></div>
        <p id="feedback-msg" style="font-size: 1.2rem;"></p>
        <button class="btn" onclick="location.reload()">إغلاق</button>
    </div>
</div>

        { q: "القاضي العادل لا يميل مع الهوى، بل يحكم بما أراه الله.", opts: ["يميل", "العادل", "الهوى", "يحكم"], ans: "يميل", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | نزاهة القضاء." },
        { q: "فراولة : فواكه", opts: ["بصل : خضروات", "ماء : شرب", "حبوب : قمح", "نحل : عسل"], ans: "بصل : خضروات", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | علاقة تصنيف." },
        { q: "يُعرف الليمون بفوائده الكبيرة في تعزيز جهاز ........ .", opts: ["المناعة", "الهضم", "التنفس", "الدوران"], ans: "المناعة", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | فوائد صحية." },
        { q: "المحكمة مكان لتحقيق العدل ورد الحقوق إلى أصحابها.", opts: ["تحقيق", "مكان", "الحقوق", "أصحابها"], ans: "مكان", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | جملة صحيحة سياقياً." },
        { q: "برتقال : حمضيات", opts: ["طماطم : خضروات", "موز : طعام", "لحم : بروتين", "خبز : قمح"], ans: "طماطم : خضروات", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | تصنيف." },
        { q: "رئة : تنفس", opts: ["معدة : هضم", "عين : إبصار", "أذن : سمع", "قلب : ضخ"], ans: "معدة : هضم", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | عضو ووظيفته." },
        { q: "اجتهاد : نجاح", opts: ["إهمال : فشل", "قراءة : وعي", "تدريب : مهارة", "نوم : راحة"], ans: "إهمال : فشل", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | سبب ونتيجة." },
        { q: "شمس : ضياء", opts: ["نار : دفء", "مصباح : نور", "قمر : ليل", "ورد : عطر"], ans: "نار : دفء", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | مصدر الشيء." },
        { q: "سكين : قطع", opts: ["قلم : كتابة", "مفتاح : فتح", "مقص : قماش", "معول : هدم"], ans: "قلم : كتابة", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | أداة ووظيفة." },
        { q: "أبيض : أسود", opts: ["فوق : تحت", "كبير : واسع", "جميل : رائع", "طويل : ممتد"], ans: "فوق : تحت", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | تضاد." },
        { q: "الناجح يستفيد من أخطائه، بينما الفاشل يكررها ويبررها.", opts: ["يستفيد", "الناجح", "الفاشل", "يكررها"], ans: "يستفيد", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | جملة صحيحة." },
        { q: "من زاد عقله قل كلامه، ومن قل صدقه زاد كذبه.", opts: ["كلامه", "عقله", "صدقه", "كذبه"], ans: "كلامه", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | حكمة مشهورة." },
        { q: "الكلمة الطيبة كـ ........ المثمرة التي تعطي أكلها كل حين.", opts: ["الشجرة", "الوردة", "الأرض", "السحابة"], ans: "الشجرة", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | تشبيه قرآني." },
        { q: "المتفوقون يضعون أهدافاً واضحة ويعملون بجد للوصول إليها.", opts: ["واضحة", "المتفوقون", "أهدافاً", "الوصول"], ans: "واضحة", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | جملة صحيحة." },
        { q: "اعتذار : خطأ", opts: ["شكر : نعمة", "ندم : ذنب", "فرح : نجاح", "خوف : خطر"], ans: "شكر : نعمة", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | رد فعل لفعل." },
        { q: "نوم : راحة", opts: ["طعام : شبع", "شرب : ري", "قراءة : فهم", "عمل : مال"], ans: "طعام : شبع", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | سبب ونتيجة." },
        { q: "جندي : معركة", opts: ["طبيب : مستشفى", "عالم : مختبر", "فلاح : حقل", "لاعب : ملعب"], ans: "لاعب : ملعب", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | الشخص ومكان عمله." },
        { q: "الصدق منجيك وإن خفت، والكذب مرديك وإن أمنت.", opts: ["منجيك", "خفت", "مرديك", "أمنت"], ans: "منجيك", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | جملة صحيحة." },
        { q: "إذا كنت تريد النجاح، فعليك بـ ........ والاجتهاد في طلب العلم.", opts: ["الصبر", "التكاسل", "التسرع", "الإهمال"], ans: "الصبر", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | مقومات النجاح." },
        { q: "العقل السليم في الجسم السليم.", opts: ["السليم", "العقل", "الجسم", "السليم (2)"], ans: "السليم", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | مقولة صحيحة." },
        { q: "ميزان : ثقل", opts: ["ترمومتر : حرارة", "ساعة : وقت", "بوصلة : اتجاه", "مسطرة : طول"], ans: "ترمومتر : حرارة", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | أداة قياس." },
        { q: "طائر : ريش", opts: ["خروف : صوف", "جمل : وبر", "سمكة : قشور", "إنسان : جلد"], ans: "خروف : صوف", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | الغطاء الخارجي." },
        { q: "الكتاب خير جليس في الزمان، وهو نعم الأنيس في الوحدة.", opts: ["جليس", "الكتاب", "الأنيس", "الوحدة"], ans: "جليس", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | بيان فضل القراءة والكتاب." },
        { q: "القراءة غذاء الروح وسبيل الرقي والتقدم.", opts: ["غذاء", "القراءة", "الرقي", "التقدم"], ans: "غذاء", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | أهمية القراءة." },
        { q: "الابتسامة لغة لا تحتاج إلى ترجمة، وهي مفتاح القلوب.", opts: ["ترجمة", "الابتسامة", "مفتاح", "القلوب"], ans: "ترجمة", tip: "ثانوية الأمير عبدالمجيد مع فيس تعبيري 😊 | أثر الابتسامة." }
    ];

    let currentIdx = 0, userScore = 0, timer, sName, sClass;

    function startQuiz() {
        sName = document.getElementById('studentName').value.trim();
        sClass = document.getElementById('studentClass').value;

        if(sName.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي الحقيقي.");
        if(!sClass) return alert("يرجى اختيار الفصل.");
        // تم تعطيل حظر الإعادة للنماذج التدريبية، يمكن تفعيله لاحقاً
        // if(localStorage.getItem("done_m21_cloud")) return alert("عذراً، لا يمكن إعادة الاختبار.");

        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= 40) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / 40`;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('fb-area').style.display = 'none';
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div');
            d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d);
            box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer);
        const correctAns = quizData[currentIdx].ans;
        const tip = quizData[currentIdx].tip;
        
        if(sel === correctAns) userScore++;

        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });

        const fbArea = document.getElementById('fb-area');
        fbArea.innerText = tip;
        fbArea.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / 40`;
        document.getElementById('feedback-msg').innerText = `تم إرسال نتيجة المتدرب: ${sName} إلى السحابة بنجاح.`;
        
        try {
            await db.collection("student_results").add({
                name: sName,
                student_class: sClass,
                score: userScore,
                total: 40,
                model_id: "21", // تم تحديث المعرف للنموذج 21
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            // localStorage.setItem("done_m21_cloud", "true");
        } catch(e) { console.error("Cloud Error:", e); }
    }
</script>
</body>
</html>
