<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النموذج (21) المطور - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; background: #fff; margin-bottom: 10px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; line-height: 1.8; color: #222; min-height: 80px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none !important; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }
        .fb-box { margin-top: 20px; padding: 20px; background: #f0f4ff; border-right: 8px solid var(--gold); border-radius: 8px; line-height: 1.8; display: none; color: #1a237e; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card">
    <div class="header">
        <h3 style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي ✨</h3>
        <h2 style="margin:5px 0;">محاكي القدرات اللفظي 2026 - نموذج (21)</h2>
        <p style="margin:0; color:var(--gold); font-weight:bold;">ثانوية الأمير عبدالمجيد 🎓</p>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group"><input type="text" id="studentName" placeholder="الاسم الثلاثي الحقيقي"></div>
        <div class="input-group">
            <select id="stageSelect" onchange="updateClasses()">
                <option value="">-- اختر المرحلة الدراسية --</option>
                <option value="أول ثانوي">أول ثانوي</option>
                <option value="ثاني ثانوي">ثاني ثانوي</option>
                <option value="ثالث ثانوي">ثالث ثانوي</option>
            </select>
            <select id="studentClass" class="hidden">
                <option value="">-- اختر الفصل --</option>
            </select>
        </div>
        <button class="btn" onclick="startQuiz()">بدء الاختبار والربط السحابي 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="timer">45</div>
        </div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div id="feedback-area" class="fb-box"></div>
        <div style="text-align: center; margin-top: 25px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">النتيجة النهائية</h2>
        <div style="font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold);" id="score-text"></div>
        <p id="cloud-msg" style="font-size: 1.1rem; color: #555;"></p>
        <button class="btn" onclick="location.reload()">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage) {
            classSelect.classList.remove('hidden');
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        } else {
            classSelect.classList.add('hidden');
        }
    }

    const quizData = [
        // تناظر لفظي
        { q: "رئة : تنفس", opts: ["قلب : ضخ", "معدة : طعام", "عين : ضوء", "يد : لمس"], ans: "قلب : ضخ", tip: "أ / عبدالعزيز الفيفي 🎓\nالعلاقة: عضو ووظيفته." },
        { q: "سعف : نخلة", opts: ["ريش : طائر", "شعر : رأس", "وبر : ناقة", "جلد : حيوان"], ans: "ريش : طائر", tip: "أ / عبدالعزيز الفيفي 🎓\nالعلاقة: غطاء خارجي طبيعي." },
        { q: "غابة : أشجار", opts: ["مكتبة : كتب", "بحر : سمك", "فصل : طلاب", "قرية : بيوت"], ans: "مكتبة : كتب", tip: "أ / عبدالعزيز الفيفي 🎓\nالعلاقة: احتواء مكاني منظم." },
        { q: "منشار : خشب", opts: ["مقص : قماش", "مبرد : حديد", "سكين : لحم", "قلم : ورقة"], ans: "مقص : قماش", tip: "أ / عبدالعزيز الفيفي 🎓\nالعلاقة: أداة وما تستخدم لقطعه." },
        { q: "فشل : اجتهاد", opts: ["خسارة : بيع", "هزيمة : تدريب", "مرض : دواء", "نجاح : مذاكرة"], ans: "هزيمة : تدريب", tip: "أ / عبدالعزيز الفيفي 🎓\nالعلاقة: تضاد سببي." },
        { q: "بؤس : شقاء", opts: ["غنى : ثراء", "حزن : كدر", "فرح : سرور", "خوف : قلق"], ans: "حزن : كدر", tip: "أ / عبدالعزيز الفيفي 🎓\nالعلاقة: ترادف." },
        { q: "نوم : ليل", opts: ["صوم : رمضان", "صلاة : مسجد", "دراسة : مدرسة", "حج : مكة"], ans: "صوم : رمضان", tip: "أ / عبدالعزيز الفيفي 🎓\nالعلاقة: اقتران زماني." },
        // إكمال الجمل
        { q: "إن المعلومات التي يحصل عليها الطفل في السنين الأولى تبقى ...... في ذهنه.", opts: ["راسخة", "عابرة", "مهمشة", "منسية"], ans: "راسخة", tip: "أ / عبدالعزيز الفيفي 🎓\nالتعليم في الصغر كالنقش على الحجر." },
        { q: "من لم يتعلم من ...... الماضي، فلن يستطيع ...... المستقبل.", opts: ["تجارب - بناء", "أخطاء - نسيان", "قصص - تجاهل", "نجاح - تخيل"], ans: "تجارب - بناء", tip: "أ / عبدالعزيز الفيفي 🎓\nالماضي مدرسة لبناء القادم." },
        { q: "الكريم هو الذي ...... من نفسه قبل أن ...... منه الآخرون.", opts: ["يعطي - يطلب", "يأخذ - يعطي", "يسأل - يأخذ", "يبخل - يطلب"], ans: "يعطي - يطلب", tip: "أ / عبدالعزيز الفيفي 🎓\nالمبادرة بالعطاء شيمة الكرام." },
        { q: "تعد القراءة من أهم وسائل ...... الثقافي بين الشعوب.", opts: ["التواصل", "التنافر", "التباعد", "الخلاف"], ans: "التواصل", tip: "أ / عبدالعزيز الفيفي 🎓\nالقراءة جسر معرفي." },
        { q: "الابتسامة طريق ...... للوصول إلى قلوب الآخرين.", opts: ["مختصر", "وعر", "مغلق", "طويل"], ans: "مختصر", tip: "أ / عبدالعزيز الفيفي 🎓\nالابتسامة لغة عالمية." },
        { q: "لا تجعل عوائق الماضي ...... عتبات المستقبل.", opts: ["تكسر", "تبني", "ترفع", "تزين"], ans: "تكسر", tip: "أ / عبدالعزيز الفيفي 🎓\nالماضي يجب ألا يعيق القادم." },
        // خطأ سياقي
        { q: "صناعة الألعاب في اليابان بلغت ذروة الإخفاق في الآونة الأخيرة.", opts: ["ذروة", "اليابان", "الإخفاق", "الأخيرة"], ans: "الإخفاق", tip: "أ / عبدالعزيز الفيفي 🎓\nالصحيح: النجاح." },
        { q: "المتفاؤل يرى فرصة في كل صعوبة، والمتشائم يرى صعوبة في كل منحة.", opts: ["المتفاؤل", "صعوبة", "المتشائم", "منحة"], ans: "منحة", tip: "أ / عبدالعزيز الفيفي 🎓\nالصحيح: فرصة." },
        { q: "يجب علينا الدفاع عن الوطن في السلم، لأن ذلك من أسمى الغايات.", opts: ["الدفاع", "الوطن", "السلم", "الغايات"], ans: "السلم", tip: "أ / عبدالعزيز الفيفي 🎓\nالصحيح: الحرب/الأزمات." },
        { q: "العظمة الحقيقية هي أن تفتخر بنجاحك أمام الضعفاء.", opts: ["العظمة", "تفتخر", "بنجاحك", "الضعفاء"], ans: "الضعفاء", tip: "أ / عبدالعزيز الفيفي 🎓\nالتفاخر أمام الضعيف يتنافى مع العظمة." },
        { q: "إذا كنت تريد النجاح، فعليك أن تسلك طريقاً ممهداً بالورود.", opts: ["تريد", "النجاح", "تسلك", "بالورود"], ans: "بالورود", tip: "أ / عبدالعزيز الفيفي 🎓\nالنجاح يحتاج كفاحاً لا ورداً." },
        { q: "الشورى مبدأ إسلامي يهدف إلى تفرّد الحاكم بالرأي.", opts: ["الشورى", "مبدأ", "تفرّد", "بالرأي"], ans: "تفرّد", tip: "أ / عبدالعزيز الفيفي 🎓\nالشورى تعني المشاركة." },
        // استيعاب المقروء
        { q: "نص: 'تعتبر المياه الجوفية مخزوناً استراتيجياً للدول الصحراوية'. ما أهمية المياه الجوفية؟", opts: ["احتياط استراتيجي", "وسيلة للترفيه", "مصدر ثانوي", "ظاهرة طبيعية"], ans: "احتياط استراتيجي", tip: "أ / عبدالعزيز الفيفي 🎓\nالإجابة بنص العبارة." },
        { q: "نص: 'التنوع البيولوجي يحافظ على توازن كوكب الأرض'. الكلمة التي يمكن استبدال (التنوع) بها:", opts: ["التعدد", "التشابه", "التطابق", "الانقراض"], ans: "التعدد", tip: "أ / عبدالعزيز الفيفي 🎓\nالتنوع يعني التعدد." },
        { q: "نص: 'الذكاء الاصطناعي أداة مساعدة للبشر وليس بديلاً عنهم'. العلاقة هنا:", opts: ["تكاملية", "تضادية", "استبدالية", "عدائية"], ans: "تكاملية", tip: "أ / عبدالعزيز الفيفي 🎓\nالأداة تكمل دور البشر." },
        // مفردة شاذة
        { q: "حدد المفردة الشاذة: (تفاح - برتقال - خيار - موز)", opts: ["تفاح", "برتقال", "خيار", "موز"], ans: "خيار", tip: "أ / عبدالعزيز الفيفي 🎓\nالخيار خضروات والبقية فواكه." },
        { q: "حدد المفردة الشاذة: (مصر - السودان - تونس - نيجيريا)", opts: ["مصر", "السودان", "تونس", "نيجيريا"], ans: "نيجيريا", tip: "أ / عبدالعزيز الفيفي 🎓\nنيجيريا دولة غير عربية." },
        { q: "حدد المفردة الشاذة: (شجاعة - كرم - بخل - مروءة)", opts: ["شجاعة", "كرم", "بخل", "مروءة"], ans: "بخل", tip: "أ / عبدالعزيز الفيفي 🎓\nالبخل صفة ذميمة والبقية حميدة." },
        { q: "حدد المفردة الشاذة: (الرياض - القاهرة - دبي - بغداد)", opts: ["الرياض", "القاهرة", "دبي", "بغداد"], ans: "دبي", tip: "أ / عبدالعزيز الفيفي 🎓\nدبي ليست عاصمة دولة." },
        { q: "حدد المفردة الشاذة: (فولاذ - نحاس - خشب - حديد)", opts: ["فولاذ", "نحاس", "خشب", "حديد"], ans: "خشب", tip: "أ / عبدالعزيز الفيفي 🎓\nالخشب ليس معدناً." },
        // الارتباط والاختلاف
        { q: "الكلمة الأكثر ارتباطاً بـ (مستشفى):", opts: ["طبيب", "شارع", "سوق", "ملعب"], ans: "طبيب", tip: "أ / عبدالعزيز الفيفي 🎓\nارتباط وظيفي ضروري." },
        { q: "الكلمة الأكثر ارتباطاً بـ (سفينة):", opts: ["مرساة", "مطار", "عربة", "سكة"], ans: "مرساة", tip: "أ / عبدالعزيز الفيفي 🎓\nالمرساة جزء ثابت للسفينة." },
        { q: "ما الكلمة التي لا تنتمي للمجموعة؟ (صقر - نسر - بومة - دجاجة)", opts: ["صقر", "نسر", "بومة", "دجاجة"], ans: "دجاجة", tip: "أ / عبدالعزيز الفيفي 🎓\nالبقية طيور جارحة." },
        { q: "ارتباط: (مفتاح) يرتبط بـ:", opts: ["قفل", "نافذة", "ستارة", "مصباح"], ans: "قفل", tip: "أ / عبدالعزيز الفيفي 🎓\nعلاقة تلازم وظيفي." },
        // منوعات قدرات 2026
        { q: "محراب : مسجد", opts: ["نصل : سيف", "قبة : سماء", "منبر : خطيب", "شاطئ : بحر"], ans: "نصل : سيف", tip: "أ / عبدالعزيز الفيفي 🎓\nجزء من كل." },
        { q: "من سعى في إصلاح شأن غيره، فقد أصلح ...... .", opts: ["شأنه", "بيته", "عمله", "ماله"], ans: "شأنه", tip: "أ / عبدالعزيز الفيفي 🎓\nالنفع متعدي." },
        { q: "العالم لا يعترف بالضعفاء، لذا يجب أن نكون ...... .", opts: ["أقوياء", "أغنياء", "فقراء", "ضعفاء"], ans: "أقوياء", tip: "أ / عبدالعزيز الفيفي 🎓\nسياق القوة." },
        { q: "عين : رؤية", opts: ["لسان : ذوق", "أذن : رأس", "رجل : مشي", "يد : عمل"], ans: "لسان : ذوق", tip: "أ / عبدالعزيز الفيفي 🎓\nعضو وحاسته." },
        { q: "الحكيم يضع الأمور في ...... الصحيحة.", opts: ["نصابها", "مكانها", "أوقاتها", "خاناتها"], ans: "نصابها", tip: "أ / عبدالعزيز الفيفي 🎓\nتعبير لغوي شهير." },
        { q: "مطار : طائرة", opts: ["ميناء : سفينة", "محطة : ركاب", "موقف : زحام", "طريق : سيارة"], ans: "ميناء : سفينة", tip: "أ / عبدالعزيز الفيفي 🎓\nمكان الانطلاق والرسو." },
        { q: "أبو جعفر المنصور هو المؤسس الحقيقي للدولة ........ .", opts: ["العباسية", "الأموية", "العثمانية", "الأيوبية"], ans: "العباسية", tip: "أ / عبدالعزيز الفيفي 🎓\nمعلومة تاريخية." },
        { q: "ليمون : حمضيات", opts: ["خيار : خضروات", "تفاح : عصير", "تمر : نخل", "قمح : حقل"], ans: "خيار : خضروات", tip: "أ / عبدالعزيز الفيفي 🎓\nنوع من فئة." },
        { q: "رغم تطور الطب، إلا أن مكافحة الشيخوخة أمر ...... .", opts: ["صعب", "مستحيل", "ممكن", "يسير"], ans: "صعب", tip: "أ / عبدالعزيز الفيفي 🎓\nالشيخوخة قدر طبيعي." }
    ];

    let currentIdx = 0, userScore = 0, timer, sName, sClass;

    function startQuiz() {
        sName = document.getElementById('studentName').value.trim();
        sClass = document.getElementById('studentClass').value;
        if(sName.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي الحقيقي.");
        if(!sClass) return alert("يرجى اختيار المرحلة والفصل.");
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= 40) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / 40`;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-area').style.display = 'none';
        const box = document.getElementById('options-area');
        box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div');
            d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d);
            box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer);
        const correctAns = quizData[currentIdx].ans;
        const tip = quizData[currentIdx].tip;
        if(sel === correctAns) userScore++;
        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });
        const fbArea = document.getElementById('feedback-area');
        fbArea.innerText = tip;
        fbArea.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / 40`;
        document.getElementById('cloud-msg').innerText = "جاري حفظ النتيجة في السحابة لـ " + sName;
        try {
            await db.collection("student_results").add({
                name: sName, student_class: sClass, score: userScore, total: 40, model_id: "21",
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('cloud-msg').innerText = "✅ تم تسجيل النتيجة بنجاح في سجلات أ/ عبدالعزيز الفيفي";
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
