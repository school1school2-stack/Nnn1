        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; background: #fff; margin-bottom: 10px; }

        .q-section-tag { color: var(--maroon); font-weight: bold; font-size: 1rem; margin-bottom: 10px; display: block; text-align: right; border-right: 4px solid var(--gold); padding-right: 10px; }

        .reading-box { background: #fff9e6; border: 1.5px solid #f0e68c; padding: 20px; border-radius: 12px; margin-bottom: 20px; line-height: 1.8; font-size: 1.1rem; text-align: justify; color: #333; }

        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none !important; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }

        <button id="start-btn" class="btn" onclick="checkDoubleEntry()">التحقق وبدء الاختبار 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="timer">45</div>

        <span id="question-category" class="q-section-tag"></span>
        <div id="reading-container" class="reading-box hidden"></div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div id="feedback-area" class="fb-box"></div>
        <div style="text-align: center; margin-top: 25px;">

    <div id="result-page" class="hidden" style="text-align: center;">

        <p id="cloud-msg" style="font-size: 1.1rem; color: #555;"></p>

</div>

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage) {
            classSelect.classList.remove('hidden');
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        } else {
            classSelect.classList.add('hidden');
        }
    }

    async function checkDoubleEntry() {
        const nameInput = document.getElementById('studentName').value.trim();
        const classInput = document.getElementById('studentClass').value;
        if(nameInput.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي.");
        if(!classInput) return alert("يرجى اختيار الفصل.");

        const btn = document.getElementById('start-btn');
        btn.innerText = "جاري التحقق سحابياً... ⏳";
        btn.disabled = true;

        try {
            const snapshot = await db.collection("student_results")
                .where("name", "==", nameInput)
                .where("model_id", "==", currentModelId)
                .get();

            if (!snapshot.empty || localStorage.getItem('taken_' + currentModelId)) {
                alert("عذراً " + nameInput + "، لقد أديت الاختبار مسبقاً. لا يسمح بالإعادة.");
                location.reload();
            } else {
                startQuiz(nameInput, classInput);
            }
        } catch (e) { startQuiz(nameInput, classInput); }
    }

        { cat: "المفردة الشاذة", q: "حدد المفردة الشاذة: (تفاح - برتقال - خيار - موز)", opts: ["تفاح", "برتقال", "خيار", "موز"], ans: "خيار", tip: "أ / عبدالعزيز الفيفي 🎓\nخضروات." },
        { cat: "المفردة الشاذة", q: "حدد المفردة الشاذة: (مصر - السودان - تونس - نيجيريا)", opts: ["مصر", "السودان", "تونس", "نيجيريا"], ans: "نيجيريا", tip: "أ / عبدالعزيز الفيفي 🎓\nليست عربية." },
        { cat: "المفردة الشاذة", q: "حدد المفردة الشاذة: (شجاعة - كرم - بخل - مروءة)", opts: ["شجاعة", "كرم", "بخل", "مروءة"], ans: "بخل", tip: "أ / عبدالعزيز الفيفي 🎓\nصفة ذميمة." },
        { cat: "المفردة الشاذة", q: "حدد المفردة الشاذة: (فولاذ - نحاس - خشب - حديد)", opts: ["فولاذ", "نحاس", "خشب", "حديد"], ans: "خشب", tip: "أ / عبدالعزيز الفيفي 🎓\nليس معدناً." },
        { cat: "المفردة الشاذة", q: "حدد المفردة الشاذة: (شمس - قمر - نجوم - غيوم)", opts: ["شمس", "قمر", "نجوم", "غيوم"], ans: "غيوم", tip: "أ / عبدالعزيز الفيفي 🎓\nليست جرماً سماوياً." }
    ];

    let currentIdx = 0, userScore = 0, timer, sName, sClass;

    function startQuiz(name, cls) {
        sName = name; sClass = cls;
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= quizData.length) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-category').innerText = `القسم: ${data.cat}`;
        
        const rc = document.getElementById('reading-container');
        if(data.passage) { rc.innerText = data.passage; rc.classList.remove('hidden'); }
        else { rc.classList.add('hidden'); }

        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-area').style.display = 'none';
        
        const box = document.getElementById('options-area');
        box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div');
            d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d);
            box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer);
        const correctAns = quizData[currentIdx].ans;
        if(sel === correctAns) userScore++;
        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });
        const fbArea = document.getElementById('feedback-area');
        fbArea.innerText = quizData[currentIdx].tip;
        fbArea.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / ${quizData.length}`;
        localStorage.setItem('taken_' + currentModelId, 'true');
        try {
            await db.collection("student_results").add({
                name: sName, student_class: sClass, score: userScore, total: quizData.length, model_id: currentModelId,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('cloud-msg').innerText = "✅ تم حفظ النتيجة بنجاح يا " + sName;
        } catch(e) { console.error(e); }
    }
</script>
