<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي القدرات اللفظي (1) المطور - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; line-height: 1.8; color: #222; min-height: 80px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none !important; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }
        .fb-box { margin-top: 20px; padding: 15px; background: #f9f9f9; border-right: 5px solid var(--gold); border-radius: 8px; display: none; text-align: right; font-size: 1rem; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card">
    <div class="header">
        <h3 style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي</h3>
        <h2 style="margin:5px 0;">محاكي القدرات اللفظي - نموذج (1) المطور</h2>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group"><input type="text" id="studentName" placeholder="أدخل الاسم الثلاثي الحقيقي"></div>
        <div class="input-group">
            <select id="studentClass">
                <option value="">اختر الفصل</option>
                <option value="101">101</option><option value="102">102</option>
                <option value="103">103</option><option value="104">104</option>
            </select>
        </div>
        <button class="btn" onclick="startQuiz()">بدء الاختبار ⮕</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold; font-size: 1.1rem;"></div>
            <div id="timer">45</div>
        </div>
        <div id="question-text" class="q-text"></div>
        <div id="options-box" class="options-grid"></div>
        <div id="feedback-area" class="fb-box"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">انتهى الاختبار</h2>
        <div style="font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold);" id="score-text"></div>
        <p id="feedback-msg" style="font-size: 1.2rem;"></p>
        <button class="btn" onclick="location.reload()">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const quizData = [
        // تناظر لفظي
        { q: "زلازل : جيولوجيا", opts: ["نجوم : فلك", "نبات : كيمياء", "أرقام : هندسة", "ماء : رياح"], ans: "نجوم : فلك", tip: "العلاقة: ظاهرة وعلم دراستها." },
        { q: "شبكية : عين", opts: ["غصن : شجرة", "غرفة : فندق", "فصل : مدرسة", "أذن : رأس"], ans: "غصن : شجرة", tip: "العلاقة: جزء من كل حي." },
        { q: "محطة : قطار", opts: ["ميناء : سفينة", "مطار : طيار", "موقف : ركاب", "طريق : سيارة"], ans: "ميناء : سفينة", tip: "العلاقة: مكان توقف وسيلة النقل." },
        { q: "شريان : دم", opts: ["ماسورة : ماء", "بحر : سمك", "خزان : وقود", "نهر : ضفة"], ans: "ماسورة : ماء", tip: "العلاقة: مجرى مخصص للسير." },
        { q: "رأس : تاج", opts: ["قدم : حذاء", "خاتم : إصبع", "سوار : معصم", "عقد : عنق"], ans: "قدم : حذاء", tip: "العلاقة: غطاء من الأعلى." },
        // إكمال جمل
        { q: "يعد السكري من الأمراض ........ التي تتطلب تعايشاً معها.", opts: ["المزمنة", "المعدية", "العابرة", "البسيطة"], ans: "المزمنة", tip: "المرض الذي يتطلب تعايشاً هو المزمن." },
        { q: "الزلازل ظاهرة طبيعية لا يمكن منعها، لكن يمكن ........ من آثارها التدميرية.", opts: ["التقليل", "الزيادة", "تجاهل", "منع"], ans: "التقليل", tip: "المنطق يقتضي تقليل الضرر عند استحالة المنع." },
        { q: "الابتسامة كلمة ........ بلا حروف.", opts: ["صامتة", "جميلة", "صادقة", "واضحة"], ans: "صامتة", tip: "الابتسامة تُرى ولا تُسمع لذا فهي صامتة." },
        { q: "لا تجعل عوائق الماضي ........ طريق المستقبل.", opts: ["تغلق", "تفتح", "تسهل", "ترسم"], ans: "تغلق", tip: "العوائق في السياق السلبي تؤدي للإغلاق." },
        { q: "المتوكل هو الذي ........ بالأسباب وكأنها كل شيء، ثم يتوكل على الله.", opts: ["يأخذ", "يترك", "يؤمن", "يدرس"], ans: "يأخذ", tip: "الأخذ بالأسباب جزء من التوكل." },
        // خطأ سياقي
        { q: "رغم تطور العلم، إلا أن التنبؤ بوقوع الزلزال لا يزال أمراً مستحيلاً.", opts: ["مستحيلاً", "التنبؤ", "وقوع", "العلم"], ans: "مستحيلاً", tip: "التصحيح: صعباً للغاية (لا مستحيل مع العلم)." },
        { q: "الناجحون لا يشتكون من الظروف، بل يستثمرونها، بينما الفاشلون يفتخرون بها.", opts: ["يفتخرون", "الناجحون", "يشتكون", "يستثمرونها"], ans: "يفتخرون", tip: "التصحيح: يتذمرون." },
        { q: "من زاد عقله قل كلامه، ومن قل صدقه زاد قدره عند الناس.", opts: ["زاد", "عقله", "صدقه", "قل"], ans: "زاد", tip: "التصحيح: قلّ قدره عند الناس." },
        { q: "أعظم محارب هو الذي لا يستطيع الانتظار قبل أن يخوض المعركة.", opts: ["لا يستطيع", "المعركة", "أعظم", "محارب"], ans: "لا يستطيع", tip: "التصحيح: يتقن الانتظار." },
        { q: "المتفائل يرى فرصة في كل صعوبة، والمتطلع يرى صعوبة في كل فرصة.", opts: ["المتطلع", "صعوبة", "فرصة", "يرى"], ans: "المتطلع", tip: "التصحيح: المتشائم." },
        // مفردة شاذة
        { q: "حدد المفردة الشاذة فيما يلي:", opts: ["الذهب", "الميزان", "المسطرة", "الترمومتر"], ans: "الذهب", tip: "البقية أدوات قياس." },
        { q: "المفردة الشاذة هي:", opts: ["حمار", "أسد", "نمر", "فهد"], ans: "حمار", tip: "البقية حيوانات مفترسة." },
        { q: "أي مدينة هي المختلفة؟", opts: ["جدة", "القاهرة", "الرياض", "بغداد"], ans: "جدة", tip: "البقية عواصم دول." },
        { q: "المفردة المختلفة هي:", opts: ["تفاح", "خيار", "طماطم", "بصل"], ans: "تفاح", tip: "البقية خضروات." },
        { q: "المفردة الشاذة فيما يلي:", opts: ["القدس", "مكة", "المدينة", "الرياض"], ans: "الرياض", tip: "البقية مدن مقدسة." },
        // ارتباط واختلاف
        { q: "ما الكلمة المرتبطة بـ (بحر)؟", opts: ["شاطئ", "غابة", "سماء", "صحراء"], ans: "شاطئ", tip: "ارتباط مكاني ملازم." },
        { q: "ما الكلمة المرتبطة بـ (طبيب)؟", opts: ["مستشفى", "مدرسة", "مطار", "ملعب"], ans: "مستشفى", tip: "ارتباط مكان العمل." },
        { q: "الارتباط الأقوى لـ (مدرسة):", opts: ["فصل", "طائرة", "حديقة", "شارع"], ans: "فصل", tip: "جزء أساسي من المدرسة." },
        { q: "يرتبط (القلم) بـ:", opts: ["كتابة", "قراءة", "مشي", "نوم"], ans: "كتابة", tip: "ارتباط الوظيفة بالأداة." },
        { q: "يرتبط (الصيف) بـ:", opts: ["حرارة", "ثلوج", "أمطار", "خريف"], ans: "حرارة", tip: "ارتباط صفة بالفصل." },
        // استيعاب مقروء
        { q: "نص: 'الأوزون طبقة حماية للأرض.' - دور الأوزون بالنسبة للأرض:", opts: ["وقائي", "علاجي", "ثانوي", "هجومي"], ans: "وقائي", tip: "الحماية تعني الوقاية." },
        { q: "نص: 'الماء سر الحياة وتلوثه يهدد الوجود.' - علاقة التلوث بالوجود:", opts: ["سبب بنتيجة", "تكامل", "تضاد", "تشابه"], ans: "سبب بنتيجة", tip: "التلوث سبب والتهديد نتيجة." },
        { q: "يفهم من جملة 'التنبؤ بالزلزال مستحيل حالياً' أن العلم:", opts: ["عاجز الآن", "سيعرف مستقبلاً", "توقف تطوره", "لا يهتم بالزلازل"], ans: "عاجز الآن", tip: "كلمة مستحيل تعني العجز في الوقت الراهن." },
        { q: "النص: 'النجاح ثمرة الصبر.' - أنسب عنوان هو:", opts: ["أهمية الصبر", "طرق الزراعة", "الصيف والنجاح", "الصبر المر"], ans: "أهمية الصبر", tip: "العنوان يعبر عن لب النص." },
        { q: "معنى 'يستثمرونها' في جملة الناجحون يستثمرون الظروف:", opts: ["يستغلونها", "يتركونها", "يخافونها", "يهملونها"], ans: "يستغلونها", tip: "الاستثمار في السياق يعني الاستغلال الأمثل." },
        // تنوع إضافي (تأسيس)
        { q: "أبو جعفر المنصور مؤسس الدولة:", opts: ["العباسية", "الأموية", "العثمانية", "الأيوبية"], ans: "العباسية", tip: "حقيقة تاريخية." },
        { q: "ليمون : حمضيات", opts: ["خيار : خضروات", "تمر : نخل", "قمح : حقل", "تفاح : عصير"], ans: "خيار : خضروات", tip: "تصنيف الفرد لفئته." },
        { q: "طير : ريش", opts: ["خروف : صوف", "إنسان : جلد", "سمك : قشور", "بعير : وبر"], ans: "خروف : صوف", tip: "غطاء الكائن الحي الطبيعي." },
        { q: "سماء : نجوم", opts: ["بحر : لؤلؤ", "صحراء : رمال", "حديقة : أشجار", "مدينة : طرق"], ans: "بحر : لؤلؤ", tip: "علاقة احتواء بداخلها أشياء مميزة." },
        { q: "المنحل : العسل", opts: ["المنجم : الماس", "المكتبة : القراءة", "المصنع : العمال", "المزرعة : الفلاح"], ans: "المنجم : الماس", tip: "مكان الاستخراج." },
        { q: "السيف : الغمد", opts: ["الميت : القبر", "السكين : اللحم", "الخاتم : الإصبع", "الكتاب : المكتبة"], ans: "الميت : القبر", tip: "مكان الاحتواء والتغطية." },
        { q: "حديد : معادن", opts: ["موز : فواكه", "ماء : سوائل", "خشب : أشجار", "قماش : ملابس"], ans: "موز : فواكه", tip: "تصنيف النوع للفئة." },
        { q: "النوم : الراحة", opts: ["الأكل : الشبع", "العمل : المال", "الدراسة : النجاح", "السفر : التعب"], ans: "الأكل : الشبع", tip: "النتيجة الفورية للفعل." },
        { q: "الغابة : الأشجار", opts: ["الجيش : الجنود", "المكتبة : الرفوف", "الفصل : الطاولات", "المدرج : المشجعين"], ans: "الجيش : الجنود", tip: "الكل ومكونه الأساسي." },
        { q: "كلمة (كتاب) ترتبط بـ:", opts: ["قراءة", "سباحة", "ركض", "طيران"], ans: "قراءة", tip: "ارتباط الوظيفة الغالبة." }
    ];

    let currentIdx = 0, userScore = 0, timer, sName, sClass;

    function startQuiz() {
        sName = document.getElementById('studentName').value.trim();
        sClass = document.getElementById('studentClass').value;

        if(sName.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي الحقيقي.");
        if(!sClass) return alert("يرجى اختيار الفصل.");
        if(localStorage.getItem("done_m1_final_v2")) return alert("عذراً، لا يمكن إعادة الاختبار.");

        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= 40) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / 40`;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-area').style.display = 'none';
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div');
            d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d);
            box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer);
        const correctAns = quizData[currentIdx].ans;
        const tip = quizData[currentIdx].tip;
        if(sel === correctAns) userScore++;

        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });

        const fb = document.getElementById('feedback-area');
        fb.innerText = "💡 تلميح: " + tip;
        fb.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / 40`;
        document.getElementById('feedback-msg').innerText = `تم حفظ نتيجة المتدرب: ${sName}`;
        
        try {
            await db.collection("student_results").add({
                name: sName,
                student_class: sClass,
                score: userScore,
                total: 40,
                model_id: "1",
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            localStorage.setItem("done_m1_final_v2", "true");
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
