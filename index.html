<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النموذج (21) المطور 2026 - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; line-height: 1.8; color: #222; min-height: 80px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none !important; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }
        .fb-box { margin-top: 20px; padding: 20px; background: #e8f5e9; border-right: 8px solid var(--gold); border-radius: 8px; line-height: 1.8; display: none; color: #1b5e20; font-weight: 500; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card">
    <div class="header">
        <h3 style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي ✨</h3>
        <h2 style="margin:5px 0;">محاكي القدرات اللفظي 2026 - نموذج (21)</h2>
        <p style="margin:0; color:var(--gold); font-weight:bold;">ثانوية الأمير عبدالمجيد 😊</p>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group"><input type="text" id="studentName" placeholder="الاسم الثلاثي الحقيقي"></div>
        <div class="input-group">
            <select id="studentClass">
                <option value="">اختر الفصل الدراسي</option>
                <!-- أول ثانوي -->
                <optgroup label="أول ثانوي">
                    <option value="101">101</option><option value="102">102</option>
                    <option value="103">103</option><option value="104">104</option>
                    <option value="105">105</option><option value="106">106</option>
                </optgroup>
                <!-- ثاني ثانوي -->
                <optgroup label="ثاني ثانوي">
                    <option value="201">201</option><option value="202">202</option>
                    <option value="203">203</option><option value="204">204</option>
                    <option value="205">205</option><option value="206">206</option>
                </optgroup>
                <!-- ثالث ثانوي -->
                <optgroup label="ثالث ثانوي">
                    <option value="301">301</option><option value="302">302</option>
                    <option value="303">303</option><option value="304">304</option>
                    <option value="305">305</option><option value="306">306</option>
                </optgroup>
            </select>
        </div>
        <button class="btn" onclick="startQuiz()">بدء الاختبار والربط السحابي 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="timer">45</div>
        </div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div id="feedback-area" class="fb-box"></div>
        <div style="text-align: center; margin-top: 25px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">النتيجة النهائية</h2>
        <div style="font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold);" id="score-text"></div>
        <p id="cloud-msg" style="font-size: 1.1rem; color: #555;"></p>
        <button class="btn" onclick="location.reload()">إغلاق</button>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const quizData = [
        { q: "زلازل : جيولوجيا", opts: ["نجوم : فلك", "نبات : كيمياء", "أرقام : هندسة", "ماء : رياح"], ans: "نجوم : فلك", tip: "💡 تحليل: العلاقة (ظاهرة طبيعية وعلم دراستها)؛ الزلازل تدرس في علم الأرض (الجيولوجيا)، والنجوم تدرس في علم الفلك." },
        { q: "يعد السكري من الأمراض ........ التي تتطلب تعايشاً معها.", opts: ["المزمنة", "المعدية", "العابرة", "البسيطة"], ans: "المزمنة", tip: "💡 تحليل: صفة الأمراض التي تستمر طويلاً وتتطلب تأقلماً هي 'المزمنة'." },
        { q: "الزلازل ظاهرة طبيعية لا يمكن منعها، لكن يمكن ........ من آثارها التدميرية.", opts: ["التقليل", "الزيادة", "تجاهل", "منع"], ans: "التقليل", tip: "💡 تحليل: المنع مستحيل، والحل المنطقي الوحيد هو التخفيف أو 'التقليل' من الخسائر." },
        { q: "رغم تطور العلم، إلا أن التنبؤ بوقوع الزلزال لا يزال أمراً مستحيلاً.", opts: ["مستحيلاً", "التنبؤ", "وقوع", "العلم"], ans: "مستحيلاً", tip: "💡 تحليل (سياق سليم): تختبر هذه الجملة مدى تركيز الطالب في الحقائق العلمية داخل سياق اللفظي." },
        { q: "شبكية : عين", opts: ["غصن : شجرة", "غرفة : فندق", "فصل : مدرسة", "أذن : رأس"], ans: "غصن : شجرة", tip: "💡 تحليل: العلاقة (جزء مكمل من كل حي)؛ الشبكية من العين، والغصن من الشجرة." },
        { q: "يجب على مريض السكري تنظيم غذائه ليتجنب ........ المفاجئ في مستوى السكر.", opts: ["الارتفاع", "الانخفاض", "الثبات", "التوازن"], ans: "الارتفاع", tip: "💡 تحليل: 'الارتفاع' المفاجئ هو المسبب الأول للمضاعفات الخطيرة في السكري." },
        { q: "الزلازل القوية قد تسبب تسونامي إذا حدثت في قاع المحيطات.", opts: ["قاع", "القوية", "تسبب", "المحيطات"], ans: "قاع", tip: "💡 تحليل: جملة سليمة تختبر استيعاب الترابط بين الظواهر الجيولوجية والمائية." },
        { q: "محطة : قطار", opts: ["ميناء : سفينة", "مطار : طيار", "موقف : ركاب", "طريق : سيارة"], ans: "ميناء : سفينة", tip: "💡 تحليل: العلاقة (مكان توقف رسمي)؛ القطار في المحطة والسفينة في الميناء." },
        { q: "أبو جعفر المنصور هو المؤسس الحقيقي للدولة ........ .", opts: ["العباسية", "الأموية", "العثمانية", "الأيوبية"], ans: "العباسية", tip: "💡 تحليل: حقيقة تاريخية تربط المنصور بتأسيس الدولة العباسية." },
        { q: "تعتبر القطارات من أقدم وسائل النقل الحديثة التي ربطت بين المدن.", opts: ["أقدم", "القطارات", "وسائل", "ربطت"], ans: "أقدم", tip: "💡 تحليل: تاريخياً السكك الحديدية سبقت الطائرات والسيارات كتقنية حديثة." },
        { q: "قضبان : قطار", opts: ["مدرج : طائرة", "أسلاك : كهرباء", "طريق : سيارة", "ماء : سفينة"], ans: "مدرج : طائرة", tip: "💡 تحليل: المسار المخصص؛ القطار على القضبان، والطائرة على المدرج." },
        { q: "بنى أبو جعفر المنصور مدينة ........ لتكون عاصمة للدولة.", opts: ["بغداد", "دمشق", "القاهرة", "البصرة"], ans: "بغداد", tip: "💡 تحليل: بناء مدينة بغداد كان أهم إنجازات الخليفة المنصور." },
        { q: "قاضي : عدل", opts: ["عالم : ورع", "طبيب : سماعة", "مهندس : خريطة", "جندي : سلاح"], ans: "عالم : ورع", tip: "💡 تحليل: الشخص والصفة الملازمة له؛ القاضي بالعدل والعالم بالورع." },
        { q: "ليمون : حمضيات", opts: ["خيار : خضروات", "تفاح : عصير", "تمر : نخل", "قمح : حقل"], ans: "خيار : خضروات", tip: "💡 تحليل: تصنيف الفرد؛ الليمون من الحمضيات، والخيار من الخضروات." },
        { q: "القاضي العادل لا يميل مع الهوى، بل يحكم بما أراه الله.", opts: ["يميل", "العادل", "الهوى", "يحكم"], ans: "يميل", tip: "💡 تحليل: جملة سليمة تؤكد على قيم النزاهة في القضاء." },
        { q: "فراولة : فواكه", opts: ["بصل : خضروات", "ماء : شرب", "حبوب : قمح", "نحل : عسل"], ans: "بصل : خضروات", tip: "💡 تحليل: الفرد وفئته؛ الفراولة فاكهة، والبصل خضروات." },
        { q: "يُعرف الليمون بفوائده الكبيرة في تعزيز جهاز ........ .", opts: ["المناعة", "الهضم", "التنفس", "الدوران"], ans: "المناعة", tip: "💡 تحليل: لليمون دور مباشر ومثبت في تقوية جهاز المناعة." },
        { q: "برتقال : حمضيات", opts: ["طماطم : خضروات", "موز : طعام", "لحم : بروتين", "خبز : قمح"], ans: "طماطم : خضروات", tip: "💡 تحليل: تصنيف الفرد؛ البرتقال حمضيات، والطماطم خضروات." },
        { q: "رئة : تنفس", opts: ["معدة : هضم", "عين : إبصار", "أذن : سمع", "قلب : ضخ"], ans: "معدة : هضم", tip: "💡 تحليل: العضو ووظيفته التحويلية الحيوية (تحويل هواء/طعام)." },
        { q: "اجتهاد : نجاح", opts: ["إهمال : فشل", "قراءة : وعي", "تدريب : مهارة", "نوم : راحة"], ans: "إهمال : فشل", tip: "💡 تحليل: علاقة سببية؛ العمل والنتيجة (سواء إيجابية أو سلبية)." },
        { q: "شمس : ضياء", opts: ["نار : دفء", "مصباح : نور", "قمر : ليل", "ورد : عطر"], ans: "نار : دفء", tip: "💡 تحليل: المصدر والناتج؛ الشمس تعطي الضياء، والنار تعطي الدفء." },
        { q: "سكين : قطع", opts: ["قلم : كتابة", "مفتاح : فتح", "مقص : قماش", "معول : هدم"], ans: "قلم : كتابة", tip: "💡 تحليل: الأداة ووظيفتها؛ السكين للقطع، والقلم للكتابة." },
        { q: "أبيض : أسود", opts: ["فوق : تحت", "كبير : واسع", "جميل : رائع", "طويل : ممتد"], ans: "فوق : تحت", tip: "💡 تحليل: علاقة تضاد مباشرة." },
        { q: "الناجح يستفيد من أخطائه، بينما الفاشل يكررها ويبررها.", opts: ["يستفيد", "الناجح", "الفاشل", "يكررها"], ans: "يستفيد", tip: "💡 تحليل: عقلية التعلم مقابل عقلية التبرير." },
        { q: "من زاد عقله قل كلامه، ومن قل صدقه زاد كذبه.", opts: ["كلامه", "عقله", "صدقه", "كذبه"], ans: "كلامه", tip: "💡 تحليل: حكمة توضح أثر العقل على الاتزان اللفظي." },
        { q: "الكلمة الطيبة كـ ........ المثمرة التي تعطي أكلها كل حين.", opts: ["الشجرة", "الوردة", "الأرض", "السحابة"], ans: "الشجرة", tip: "💡 تحليل: تشبيه قرآني بليغ للنفع المستمر." },
        { q: "المتفوقون يضعون أهدافاً واضحة ويعملون بجد للوصول إليها.", opts: ["واضحة", "المتفوقون", "أهدافاً", "الوصول"], ans: "واضحة", tip: "💡 تحليل: وضوح الهدف هو أساس النجاح." },
        { q: "اعتذار : خطأ", opts: ["شكر : نعمة", "ندم : ذنب", "فرح : نجاح", "خوف : خطر"], ans: "شكر : نعمة", tip: "💡 تحليل: رد الفعل الأخلاقي؛ الاعتذار للخطأ، والشكر للنعمة." },
        { q: "نوم : راحة", opts: ["طعام : شبع", "شرب : ري", "قراءة : فهم", "عمل : مال"], ans: "طعام : شبع", tip: "💡 تحليل: الغاية الفطرية؛ النوم للراحة، والطعام للشبع." },
        { q: "جندي : معركة", opts: ["لاعب : ملعب", "طبيب : مستشفى", "عالم : مختبر", "فلاح : حقل"], ans: "لاعب : ملعب", tip: "💡 تحليل: الشخص ومكان نشاطه التنافسي أو العملي." },
        { q: "الصدق منجيك وإن خفت، والكذب مرديك وإن أمنت.", opts: ["منجيك", "خفت", "مرديك", "أمنت"], ans: "منجيك", tip: "💡 تحليل: بيان عاقبة الصدق الحميدة دائماً." },
        { q: "إذا كنت تريد النجاح، فعليك بـ ........ والاجتهاد في طلب العلم.", opts: ["الصبر", "التكاسل", "التسرع", "الإهمال"], ans: "الصبر", tip: "💡 تحليل: النجاح يحتاج لاقتران الصبر بالجهد." },
        { q: "العقل السليم في الجسم السليم.", opts: ["السليم", "العقل", "الجسم", "السليم (2)"], ans: "السليم", tip: "💡 تحليل: تلازم الصحة البدنية والقدرات الذهنية." },
        { q: "ميزان : ثقل", opts: ["ترمومتر : حرارة", "ساعة : وقت", "بوصلة : اتجاه", "مسطرة : طول"], ans: "ترمومتر : حرارة", tip: "💡 تحليل: أداة قياس لظاهرة فيزيائية." },
        { q: "طائر : ريش", opts: ["خروف : صوف", "جمل : وبر", "سمكة : قشور", "إنسان : جلد"], ans: "خروف : صوف", tip: "💡 تحليل: الغطاء الخارجي المميز للكائن." },
        { q: "الكتاب خير جليس في الزمان، وهو نعم الأنيس في الوحدة.", opts: ["جليس", "الكتاب", "الأنيس", "الوحدة"], ans: "جليس", tip: "💡 تحليل: الثناء على القيمة المعرفية للكتاب." },
        { q: "القراءة غذاء الروح وسبيل الرقي والتقدم.", opts: ["غذاء", "القراءة", "الرقي", "التقدم"], ans: "غذاء", tip: "💡 تحليل: ضرورة القراءة لبناء الفرد." },
        { q: "الابتسامة لغة لا تحتاج إلى ترجمة، وهي مفتاح القلوب.", opts: ["ترجمة", "الابتسامة", "مفتاح", "القلوب"], ans: "ترجمة", tip: "💡 تحليل: عظمة الابتسامة في التواصل الإنساني." },
        { q: "عجين : خبز", opts: ["ماء : ثلج", "نواة : تمر", "طحين : قمح", "صوف : غنم"], ans: "ماء : ثلج", tip: "💡 تحليل: علاقة تحول مادي من حالة لأخرى." },
        { q: "أذن : سمع", opts: ["عين : إبصار", "يد : لمس", "أنف : شم", "لسان : تذوق"], ans: "عين : إبصار", tip: "💡 تحليل: حاسة رئيسية ووظيفتها المباشرة." }
    ];

    let currentIdx = 0, userScore = 0, timer, sName, sClass;

    function startQuiz() {
        sName = document.getElementById('studentName').value.trim();
        sClass = document.getElementById('studentClass').value;
        if(sName.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي الحقيقي.");
        if(!sClass) return alert("يرجى اختيار الفصل.");
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= 40) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / 40`;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-area').style.display = 'none';
        const box = document.getElementById('options-area');
        box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div');
            d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d);
            box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer);
        const correctAns = quizData[currentIdx].ans;
        const tip = quizData[currentIdx].tip;
        if(sel === correctAns) userScore++;
        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });
        const fbArea = document.getElementById('feedback-area');
        fbArea.innerHTML = tip;
        fbArea.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / 40`;
        document.getElementById('cloud-msg').innerText = "جاري حفظ النتيجة في السحابة لـ " + sName;
        try {
            await db.collection("student_results").add({
                name: sName, student_class: sClass, score: userScore, total: 40, model_id: "21",
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('cloud-msg').innerText = "✅ تم تسجيل النتيجة في لوحة تحكم أ/ عبدالعزيز الفيفي";
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
