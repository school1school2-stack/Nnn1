<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النموذج (1) - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        #protection-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: var(--gold); z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .quiz-card { background: var(--white); width: 100%; max-width: 950px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 12px solid var(--maroon); padding: 35px; position: relative; }
        .quiz-header { text-align: center; border-bottom: 3px double var(--gold); margin-bottom: 25px; padding-bottom: 15px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f9f9f9; padding: 12px 20px; border-radius: 15px; }
        .q-num { background: var(--maroon); color: var(--gold); padding: 5px 20px; border-radius: 30px; font-weight: bold; }
        .timer-box { font-weight: 800; font-size: 1.4rem; color: var(--maroon); border: 3px solid var(--gold); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .q-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; text-align: center; color: #111; line-height: 1.6; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; text-align: center; font-size: 1.1rem; background: #fff; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .feedback { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; background: #fffde7; border-right: 8px solid var(--maroon); }
        .btn { background: var(--maroon); color: var(--gold); padding: 15px 45px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        .hidden { display: none !important; }
        .input-group { margin-bottom: 15px; text-align: right; width: 80%; margin-left: auto; margin-right: auto; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--maroon); font-size: 1rem; outline: none; box-sizing: border-box; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="protection-mask">
    <h1>⚠️ تنبيه أمني</h1>
    <p>المحتوى خاص بالأستاذ عبدالعزيز الفيفي. يمنع النسخ أو التصوير.</p>
</div>

<div class="quiz-card" id="main-app">
    <div class="quiz-header">
        <h3 id="sig" style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد</h3>
        <h2 style="margin:10px 0;">النموذج (1) - المهارات اللفظية</h2>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group">
            <input type="text" id="nameInp" placeholder="أدخل اسمك الثلاثي الحقيقي...">
        </div>
        <div class="input-group">
            <select id="classInp">
                <option value="">اختر الفصل...</option>
                <option value="101">101</option>
                <option value="102">102</option>
                <option value="103">103</option>
                <option value="104">104</option>
            </select>
        </div>
        <br><button class="btn" onclick="init()">بدء الاختبار ⮕</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div>👤 <span id="user-display"></span> | الفصل: <span id="class-display"></span></div>
            <div class="q-num" id="q-info"></div>
            <div id="timer" class="timer-box">45</div>
        </div>
        <div id="q-content" class="q-text"></div>
        <div id="opts-box" class="options-grid"></div>
        <div id="fb-box" class="feedback">
            <b id="fb-res"></b>
            <div id="fb-logic" style="margin-top:5px; font-size:0.9rem;"></div>
        </div>
        <div style="text-align: center; margin-top: 30px;">
            <button id="next-btn" class="btn hidden" onclick="goNext()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="final-page" class="hidden" style="text-align: center;">
        <h1 id="final-score" style="font-size: 4rem; color: var(--maroon);"></h1>
        <p>تم حفظ نتيجتك بنجاح في لوحة تحكم أ/ عبدالعزيز الفيفي</p>
        <button class="btn" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const questions = [
        { q: "رئة : تنفس", opts: ["عين : رؤية", "قلب : ضخ", "أذن : سماع", "معدة : هضم"], ans: "قلب : ضخ", tip: "علاقة وظيفة؛ الرئة وظيفتها التنفس والقلب وظيفته الضخ." },
        { q: "من غضب من لا شيء، رضي بـ ........", opts: ["شيء", "كل شيء", "لا شيء", "أقل شيء"], ans: "لا شيء", tip: "حكمة؛ من يغضب بلا سبب يرضى بلا عوض." },
        { q: "العاقل من يتعظ بغيره، والجاهل من يتعظ بنفسه.", opts: ["العاقل", "يتعظ", "بغيره", "الجاهل"], ans: "الجاهل", tip: "خطأ سياقي؛ التصحيح: (الأحمق) هو من لا يتعظ إلا بنفسه." },
        { q: "نحل : عسل", opts: ["بقر : حليب", "منجم : ذهب", "حقل : قمح", "فرن : خبز"], ans: "بقر : حليب", tip: "علاقة إنتاج؛ النحل ينتج العسل والبقر ينتج الحليب." },
        { q: "الابتسامة كلمة ........ بلا حروف.", opts: ["جميلة", "صادقة", "صامتة", "واضحة"], ans: "جميلة", tip: "إكمال جمل؛ الابتسامة أجمل لغة تعبيرية." }
    ];

    while(questions.length < 40) { questions.push({...questions[questions.length % 5]}); }

    let current = 0, score = 0, timerObj, mixedPool = [], user = "", classVal = "";

    function init() {
        user = document.getElementById('nameInp').value.trim();
        classVal = document.getElementById('classInp').value;

        if (user.split(' ').length < 3) return alert("يرجى إدخال الاسم الثلاثي الحقيقي.");
        if (!classVal) return alert("يرجى اختيار الفصل.");
        if (localStorage.getItem("done_m1")) return alert("عذراً، أديت هذا الاختبار مسبقاً.");

        document.getElementById('user-display').innerText = user;
        document.getElementById('class-display').innerText = classVal;
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        mixedPool = questions.sort(() => Math.random() - 0.5);
        load();
    }

    function load() {
        if(current >= 40) return finish();
        const data = mixedPool[current];
        document.getElementById('q-info').innerText = `السؤال ${current + 1} / 40`;
        document.getElementById('q-content').innerText = data.q;
        document.getElementById('fb-box').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');
        const box = document.getElementById('opts-box');
        box.innerHTML = '';
        data.opts.sort(() => Math.random() - 0.5).forEach(o => {
            const div = document.createElement('div');
            div.className = 'opt'; div.innerText = o;
            div.onclick = () => check(o, div);
            box.appendChild(div);
        });
        startT();
    }

    function check(sel, el) {
        clearInterval(timerObj);
        const data = mixedPool[current];
        const isOk = (sel === data.ans);
        if(isOk) score++;
        document.querySelectorAll('.opt').forEach(b => {
            b.onclick = null;
            if(b.innerText === data.ans) b.classList.add('correct');
            else if(b.innerText === sel) b.classList.add('wrong');
        });
        document.getElementById('fb-box').style.display = 'block';
        document.getElementById('fb-res').innerText = isOk ? "✅ أحسنت" : "❌ خطأ";
        document.getElementById('fb-logic').innerText = data.tip;
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startT() {
        let s = 45; const t = document.getElementById('timer'); t.innerText = s;
        timerObj = setInterval(() => {
            s--; t.innerText = s;
            if(s <= 0) { clearInterval(timerObj); check("N/A", null); }
        }, 1000);
    }

    function goNext() { current++; load(); }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('final-page').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / 40`;
        
        try {
            await db.collection("student_results").add({
                name: user,
                student_class: classVal,
                score: score,
                total: 40,
                model_id: "1", 
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            localStorage.setItem("done_m1", "true");
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
