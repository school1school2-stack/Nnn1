<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج (1) - حماية مشددة - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { margin: 15px auto; width: 85%; text-align: right; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; box-sizing: border-box; background: #fff; margin-bottom: 10px; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .hidden { display: none !important; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 30px; line-height: 1.8; color: #222; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; text-align: center; font-size: 1.2rem; background: #fff; margin-bottom: 10px; font-weight: 600; }
        .correct { background: var(--correct) !important; color: white; }
        .wrong { background: var(--wrong) !important; color: white; }
        #timer { color: var(--maroon); font-size: 1.6rem; font-weight: 800; border: 2px solid var(--gold); padding: 5px 15px; border-radius: 50px; }
        .fb-box { margin-top: 20px; padding: 20px; background: #f0f4ff; border-right: 8px solid var(--gold); border-radius: 8px; display: none; }
        .reading-text { background-color: #fffde7; border: 1px solid #fff59d; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1.1rem; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card">
    <div class="header">
        <h3 style="margin:0; color:var(--maroon);">أ / عبدالعزيز الفيفي ✨</h3>
        <h2 style="margin:5px 0;">محاكي القدرات - نموذج (1)</h2>
        <p style="margin:0; color:var(--gold); font-weight:bold;">ثانوية الأمير عبدالمجيد 😊</p>
    </div>

    <!-- رسالة الحظر المشددة -->
    <div id="blocked-page" class="hidden" style="text-align: center; padding: 50px;">
        <h2 style="color: var(--wrong);">نظام الحماية 🛡️</h2>
        <p style="font-size: 1.3rem;">تم رصد محاولة دخول مكررة من هذا الجهاز.</p>
        <p>لا يسمح النظام بإعادة الاختبار بعد إرسال النتيجة لضمان العدالة.</p>
    </div>

    <div id="start-page" style="text-align: center;">
        <div class="input-group"><input type="text" id="studentName" placeholder="الاسم الثلاثي الحقيقي"></div>
        <div class="input-group">
            <select id="stageSelect" onchange="updateClasses()">
                <option value="">-- اختر المرحلة الدراسية --</option>
                <option value="أول ثانوي">أول ثانوي</option>
                <option value="ثاني ثانوي">ثاني ثانوي</option>
                <option value="ثالث ثانوي">ثالث ثانوي</option>
            </select>
            <select id="studentClass" class="hidden"><option value="">-- اختر الفصل --</option></select>
        </div>
        <button id="start-btn" class="btn" onclick="startQuiz()">بدء الاختبار 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div id="q-counter" style="font-weight:bold;"></div>
            <div id="timer">45</div>
        </div>
        <div id="reading-content" class="reading-text hidden"></div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area"></div>
        <div id="feedback-area" class="fb-box"></div>
        <div style="text-align: center; margin-top: 25px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2>انتهى الاختبار</h2>
        <div style="font-size: 4rem; color: var(--gold);" id="score-text"></div>
        <p id="cloud-msg"></p>
        <button class="btn" onclick="location.reload()">إغلاق</button>
    </div>
</div>

<script>
    const MODEL_ID = "QUDRAT_V1"; 

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // وظيفة بصمة الجهاز المبسطة
    function getDeviceFingerprint() {
        return navigator.userAgent + navigator.language + screen.colorDepth + screen.width + screen.height;
    }

    window.onload = async function() {
        const fingerprint = btoa(getDeviceFingerprint()); // تشفير البصمة
        if (localStorage.getItem("done_" + MODEL_ID)) {
            showBlocked();
        }
    };

    function showBlocked() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('blocked-page').classList.remove('hidden');
    }

    async function startQuiz() {
        const name = document.getElementById('studentName').value.trim();
        const sClass = document.getElementById('studentClass').value;
        
        if(name.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي.");
        if(!sClass) return alert("اختر الفصل.");

        // حماية إضافية: التحقق من قاعدة البيانات مباشرة قبل البدء
        const check = await db.collection("student_results")
            .where("name", "==", name)
            .where("student_class", "==", sClass)
            .where("model_id", "==", MODEL_ID)
            .get();

        if(!check.empty) {
            alert("لقد قمت بحل هذا النموذج مسبقاً وسجلت نتيجتك.");
            showBlocked();
            return;
        }

        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    // (بقية كود الأسئلة والمصفوفة quizData كما هي في النموذج السابق)
    // ملاحظة: تأكد من وضع مصفوفة الـ 40 سؤالاً هنا
    const quizData = [ /* الـ 40 سؤالاً المذكورة في الرد السابق */ ];

    let currentIdx = 0, userScore = 0, timer;

    function loadQuestion() {
        if(currentIdx >= 40) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / 40`;
        const readingBox = document.getElementById('reading-content');
        if(data.text) { readingBox.innerText = data.text; readingBox.classList.remove('hidden'); }
        else { readingBox.classList.add('hidden'); }
        document.getElementById('question-text').innerText = data.q;
        const box = document.getElementById('options-area');
        box.innerHTML = '';
        data.opts.forEach(o => {
            const d = document.createElement('div');
            d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d);
            box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer);
        const correctAns = quizData[currentIdx].ans;
        if(sel === correctAns) userScore++;
        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });
        document.getElementById('feedback-area').innerHTML = quizData[currentIdx].tip;
        document.getElementById('feedback-area').style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        localStorage.setItem("done_" + MODEL_ID, "true"); // قفل المتصفح
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / 40`;
        
        try {
            await db.collection("student_results").add({
                name: document.getElementById('studentName').value,
                student_class: document.getElementById('studentClass').value,
                score: userScore,
                model_id: MODEL_ID,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('cloud-msg').innerText = "✅ تم حفظ نتيجتك بنجاح.";
        } catch(e) { console.error(e); }
    }

    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage) {
            classSelect.classList.remove('hidden');
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        } else { classSelect.classList.add('hidden'); }
    }
</script>
</body>
</html>
